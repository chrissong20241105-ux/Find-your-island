<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找到你的完美海岛 · V0.5</title>
  <style>
    :root {
      --bg1: #0f6fff;
      --bg2: #00c6a7;
      --bg3: #7dd3fc;
      --card: rgba(255,255,255,.14);
      --card-border: rgba(255,255,255,.22);
      --text: #ffffff;
      --muted: rgba(255,255,255,.78);
      --shadow: 0 20px 60px rgba(0,0,0,.18);
      --dark: #0f172a;
      --accent: #22d3ee;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,.18), transparent 22%),
        radial-gradient(circle at 82% 18%, rgba(255,255,255,.16), transparent 18%),
        radial-gradient(circle at 72% 78%, rgba(255,255,255,.12), transparent 20%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 45%, var(--bg3));
      overflow-x: hidden;
    }

    .floating {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      filter: blur(2px);
      animation: floatY 16s ease-in-out infinite;
    }

    .bubble:nth-child(1) { width: 160px; height: 160px; left: 6%; top: 10%; }
    .bubble:nth-child(2) { width: 220px; height: 220px; right: 8%; top: 12%; animation-delay: -4s; }
    .bubble:nth-child(3) { width: 140px; height: 140px; left: 12%; bottom: 12%; animation-delay: -8s; }
    .bubble:nth-child(4) { width: 260px; height: 260px; right: 12%; bottom: 8%; animation-delay: -11s; }

    @keyframes floatY {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-18px); }
    }

    .app {
      width: min(980px, calc(100% - 28px));
      margin: 28px auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .brand-badge {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.24);
      display: grid;
      place-items: center;
      font-size: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .brand small {
      display: block;
      font-weight: 400;
      color: var(--muted);
      margin-top: 2px;
    }

    .glass {
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .progress-wrap {
      padding: 14px 16px;
      border-radius: 18px;
      min-width: 230px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .progress {
      height: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #dff9ff, #67e8f9);
      transition: width .35s ease;
    }

    .screen {
      min-height: 72vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel {
      width: 100%;
      border-radius: 28px;
      padding: 34px;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), transparent),
        radial-gradient(circle at top right, rgba(255,255,255,.1), transparent 24%);
      pointer-events: none;
    }

    .question-header {
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(255,255,255,.72);
      margin-bottom: 10px;
    }

    .question-title {
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1.08;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .question-desc {
      color: rgba(255,255,255,.84);
      font-size: 16px;
      line-height: 1.75;
      max-width: 720px;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 28px;
      position: relative;
      z-index: 1;
    }

    .option {
      border-radius: 22px;
      padding: 20px 18px;
      cursor: pointer;
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .option:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.36);
      background: rgba(255,255,255,.14);
    }

    .option-icon {
      font-size: 26px;
      margin-bottom: 14px;
    }

    .option-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .option-desc {
      font-size: 14px;
      color: rgba(255,255,255,.78);
      line-height: 1.6;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      margin-top: 26px;
      position: relative;
      z-index: 1;
    }

    .nav-btn {
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: white;
      padding: 12px 18px;
      border-radius: 14px;
      cursor: pointer;
      transition: .2s ease;
      font-size: 14px;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,.16);
    }

    .nav-btn[disabled] {
      opacity: .38;
      cursor: not-allowed;
    }

    .result-wrap {
      width: 100%;
    }

    .result-hero {
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 18px;
    }

    .result-hero h2 {
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.12;
      margin-bottom: 10px;
    }

    .result-hero p {
      color: rgba(255,255,255,.84);
      line-height: 1.8;
      max-width: 760px;
    }

    .answers-chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .chip {
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.92);
    }

    .cards {
      display: grid;
      gap: 18px;
    }

    .result-card {
      border-radius: 26px;
      overflow: hidden;
      position: relative;
      min-height: 280px;
      display: flex;
      align-items: end;
      background-size: cover;
      background-position: center;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.18);
    }

    .result-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.22) 35%, rgba(0,0,0,.72));
    }

    .result-content {
      position: relative;
      z-index: 1;
      padding: 26px;
      width: 100%;
    }

    .rank {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.16);
      font-size: 13px;
      margin-bottom: 14px;
    }

    .result-title-row {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
    }

    .result-title h3 {
      font-size: 28px;
      line-height: 1.15;
      margin-bottom: 6px;
    }

    .result-title p {
      color: rgba(255,255,255,.82);
      font-size: 14px;
    }

    .score-badge {
      min-width: 92px;
      text-align: center;
      border-radius: 18px;
      padding: 12px 10px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.14);
    }

    .score-badge strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .score-badge span {
      font-size: 12px;
      color: rgba(255,255,255,.8);
    }

    .summary {
      color: rgba(255,255,255,.92);
      line-height: 1.8;
      max-width: 820px;
      margin-bottom: 16px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .meta-item {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 12px;
      min-height: 78px;
    }

    .meta-item small {
      display: block;
      color: rgba(255,255,255,.72);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .meta-item strong {
      display: block;
      line-height: 1.5;
      font-size: 14px;
      font-weight: 700;
    }

    .why {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }

    .why h4 {
      font-size: 15px;
      margin-bottom: 8px;
    }

    .why ul {
      padding-left: 18px;
      line-height: 1.85;
      color: rgba(255,255,255,.92);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.12);
      font-size: 13px;
      color: rgba(255,255,255,.9);
    }

    .result-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 22px;
    }

    .action-btn {
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      cursor: pointer;
      font-size: 15px;
      transition: .2s ease;
    }

    .primary-btn {
      color: #083344;
      background: linear-gradient(90deg, #dff9ff, #8ef9f3);
    }

    .secondary-btn {
      color: white;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.16);
    }

    .action-btn:hover {
      transform: translateY(-1px);
    }

    .note {
      margin-top: 16px;
      text-align: center;
      color: rgba(255,255,255,.72);
      font-size: 12px;
      line-height: 1.6;
    }

    .fade-in {
      animation: fadeInUp .45s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 860px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }
      .options {
        grid-template-columns: 1fr;
      }
      .meta-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 16px, 980px);
        margin: 8px auto 18px;
        padding: 10px;
      }
      .panel {
        padding: 22px 18px;
      }
      .meta-grid {
        grid-template-columns: 1fr;
      }
      .result-title-row {
        flex-direction: column;
      }
      .score-badge {
        width: 100%;
      }
    }
  </style>
</head>

        tradeoff: "设施不是顶奢路线，私密度和设计感不如超高端岛。"
      },
      {

          "它的长板不是单点爆炸，而是整体体验不容易翻车。"
        ],
        tradeoff: "风格不算最强辨识度，顶奢感和拍照冲击力不是最顶。"
      },
      {
        id: "ayada",
        name: "阿雅达",
        en: "Ayada Maldives",
        image: "https://images.unsplash.com/photo-1493558103817-58b2924bce98?auto=format&fit=crop&w=1600&q=80",
        summary: "泄湖很美，蜜月和一价全包体验都不错，整体氛围很讨喜，适合想要‘浪漫但不过于夸张’的客人。",
        budget: "high",
        groups: ["couple", "family"],
        transfer: "domestic",
        style: "热带奢华风 · 浪漫感强",
        tags: ["蜜月", "泄湖漂亮", "度假感强", "中高端"],
        meta: {
          budget: "2w–4w / 人",
          transfer: "内飞 + 快艇",
          bestFor: "重视浪漫、景色和完整度假的用户",
          atmosphere: "热带、浪漫、拍照友好"
        },
        strengths: {
          marine: 6,
          scenery: 9,
          luxury: 8,
          value: 7,
          relax: 8,
          romance: 9,
          photo: 8,
          privacy: 7
        },
        why: [
          "如果你想要浪漫、景色和完整的度假感，它很容易高分。",
          "泄湖和整体海水颜色很讨喜，视觉感受强。",
          "适合愿意接受稍复杂转运、换取更完整体验的人。"
        ],
        tradeoff: "上岛更折腾，不适合特别怕转运的人。"
      }
    ];

    const labels = {
      budget: {
        budget: "5k–1w / 人",
        mid: "1w–2w / 人",
        high: "2w–4w / 人",
        ultra: "4w+ / 人"
      },
      group: {
        couple: "蜜月 / 情侣",
        family: "亲子家庭",
        friends: "朋友出行",
        solo: "一个人放松"
      },
      priority: {
        marine: "浮潜 / 潜水",
        scenery: "沙滩和海水颜值",
        luxury: "酒店奢华和服务",
        value: "性价比和省心"
      },
      transfer: {
        boat: "只接受快艇",
        seaplane: "可以接受水飞",
        domestic: "内飞 + 快艇也可以",
        any: "只要岛好都行"
      },
      vibe: {
        relax: "轻松躺平",
        romance: "浪漫蜜月感",
        luxury: "奢华仪式感",
        nature: "原生态海洋体验",
        photo: "网红拍照感"
      }
    };

    const answers = {};
    let currentStep = 0;

    const panel = document.getElementById("panel");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    function updateProgress() {
      const total = questions.length;
      const current = Math.min(currentStep + 1, total);
      const percent = currentStep >= total ? 100 : ((currentStep) / total) * 100;
      progressBar.style.width = `${percent}%`;
      progressText.textContent = currentStep >= total ? "推荐结果" : `问题 ${current} / ${total}`;
    }

    function renderQuestion() {
      const q = questions[currentStep];
      updateProgress();

      panel.className = "panel glass fade-in";
      panel.innerHTML = `
        <div class="question-header">
          <div class="eyebrow">${q.eyebrow}</div>
          <div class="question-title">${q.title}</div>
          <div class="question-desc">${q.desc}</div>
        </div>

        <div class="options">
          ${q.options.map(option => `
            <div class="option" data-value="${option.value}">
              <div>
                <div class="option-icon">${option.icon}</div>
                <div class="option-title">${option.title}</div>
              </div>
              <div class="option-desc">${option.desc}</div>
            </div>
          `).join("")}
        </div>

        <div class="nav">
          <button class="nav-btn" ${currentStep === 0 ? "disabled" : ""} id="backBtn">上一步</button>
          <button class="nav-btn" id="skipBtn">稍后再细化</button>
        </div>
      `;

      document.querySelectorAll(".option").forEach(el => {
        el.addEventListener("click", () => {
          answers[q.key] = el.dataset.value;
          currentStep += 1;
          if (currentStep < questions.length) {
            renderQuestion();
          } else {
            renderResults();
          }
        });
      });

      document.getElementById("backBtn").addEventListener("click", () => {
        if (currentStep > 0) {
          currentStep -= 1;
          renderQuestion();
        }
      });

      document.getElementById("skipBtn").addEventListener("click", () => {
        // V0.5 里跳过就默认进下一题，但保留空值兜底
        currentStep += 1;
        if (currentStep < questions.length) {
          renderQuestion();
        } else {
          renderResults();
        }
      });
    }

    function budgetScore(userBudget, islandBudget) {
      const map = { budget: 0, mid: 1, high: 2, ultra: 3 };
      if (!userBudget) return 12;
      const diff = Math.abs(map[userBudget] - map[islandBudget]);
      if (diff === 0) return 24;
      if (diff === 1) return 15;
      if (diff === 2) return 6;
      return 0;
    }

    function groupScore(userGroup, groups) {
      if (!userGroup) return 10;
      return groups.includes(userGroup) ? 18 : 4;
    }

    function priorityScore(userPriority, strengths) {
      if (!userPriority) return 16;
      return (strengths[userPriority] || 0) * 3.3;
    }

    function transferScore(userTransfer, islandTransfer) {
      if (!userTransfer) return 8;
      if (userTransfer === "any") return 10;
      if (userTransfer === islandTransfer) return 14;
      if (userTransfer === "domestic" && (islandTransfer === "boat" || islandTransfer === "seaplane")) return 10;
      if (userTransfer === "seaplane" && islandTransfer === "boat") return 8;
      return 1;
    }

    function vibeScore(userVibe, strengths) {
      if (!userVibe) return 12;
      const keyMap = {
        relax: "relax",
        romance: "romance",
        luxury: "luxury",
        nature: "marine",
        photo: "photo"
      };
      return (strengths[keyMap[userVibe]] || 0) * 2.5;
    }

    function buildReasons(island) {
      const reasons = [];

      if (answers.priority === "marine") {
        reasons.push(`你最看重海洋体验，而它在这项上表现为 ${island.strengths.marine}/10。`);
      }
      if (answers.priority === "scenery") {
        reasons.push(`你更在意沙滩和海水颜值，而它在风景维度上有 ${island.strengths.scenery}/10。`);
      }
      if (answers.priority === "luxury") {
        reasons.push(`你更在意酒店和服务，而它在奢华体验上有 ${island.strengths.luxury}/10。`);
      }
      if (answers.priority === "value") {
        reasons.push(`你更看重性价比和省心，而它在性价比维度上有 ${island.strengths.value}/10。`);
      }

      if (answers.group && island.groups.includes(answers.group)) {
        reasons.push(`它对“${labels.group[answers.group]}”这类客群的适配度比较高。`);
      }

      if (answers.transfer) {
        if (answers.transfer === island.transfer) {
          reasons.push(`它的上岛方式和你的接受度是直接匹配的。`);
        } else if (answers.transfer === "any") {
          reasons.push(`你对转运比较宽容，所以它不会因为交通被明显扣分。`);
        }
      }

      if (answers.vibe) {
        const vibeMap = {
          relax: "轻松躺平",
          romance: "浪漫蜜月感",
          luxury: "奢华仪式感",
          nature: "原生态海洋体验",
          photo: "网红拍照感"
        };
        reasons.push(`你的度假气质更偏“${vibeMap[answers.vibe]}”，它在这个方向上比较贴合。`);
      }

      return reasons.slice(0, 3);
    }

    function calculateResults() {
      return islands.map(island => {
        const score =
          budgetScore(answers.budget, island.budget) +
          groupScore(answers.group, island.groups) +
          priorityScore(answers.priority, island.strengths) +
          transferScore(answers.transfer, island.transfer) +
          vibeScore(answers.vibe, island.strengths);

        return {
          ...island,
          score: Math.round(score),
          reasons: buildReasons(island)
        };
      }).sort((a, b) => b.score - a.score).slice(0, 3);
    }

    function renderResults() {
      const results = calculateResults();
      updateProgress();
      progressBar.style.width = "100%";

      panel.className = "result-wrap fade-in";
      panel.innerHTML = `
        <div class="result-hero glass">
          <h2>这是我为你挑出来的 3 个更适合的海岛方向</h2>
          <p>
            这版是 V0.5，所以先用规则推荐，而不是最终版 AI。
            我会根据你的预算、同行人群、最在意的体验、对上岛方式的接受度和度假感觉，给每个岛打一个匹配分。
          </p>

          <div class="answers-chip-wrap">
            ${Object.keys(answers).map(key => `
              <div class="chip">${labels[key][answers[key]] || answers[key]}</div>
            `).join("")}
          </div>
        </div>

        <div class="cards">
          ${results.map((item, index) => `
            <div class="result-card" style="background-image:
              linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.18) 35%, rgba(0,0,0,.72)),
              url('${item.image}');
            ">
              <div class="result-content">
                <div class="rank">${index === 0 ? "🏆 第一推荐" : index === 1 ? "🥈 第二推荐" : "🥉 第三推荐"}</div>

                <div class="result-title-row">
                  <div class="result-title">
                    <h3>${item.name}</h3>
                    <p>${item.en} · ${item.style}</p>
                  </div>
                  <div class="score-badge">
                    <strong>${item.score}</strong>
                    <span>匹配分</span>
                  </div>
                </div>

                <div class="summary">${item.summary}</div>

                <div class="meta-grid">
                  <div class="meta-item">
                    <small>预算带</small>
                    <strong>${item.meta.budget}</strong>
                  </div>
                  <div class="meta-item">
                    <small>上岛方式</small>
                    <strong>${item.meta.transfer}</strong>
                  </div>
                  <div class="meta-item">
                    <small>更适合谁</small>
                    <strong>${item.meta.bestFor}</strong>
                  </div>
                  <div class="meta-item">
                    <small>整体气质</small>
                    <strong>${item.meta.atmosphere}</strong>
                  </div>
                </div>

                <div class="why">
                  <h4>为什么推荐你看这个</h4>
                  <ul>
                    ${item.reasons.map(reason => `<li>${reason}</li>`).join("")}
                  </ul>
                </div>

                <div class="tag-list">
                  ${item.tags.map(tag => `<div class="tag">${tag}</div>`).join("")}
                  <div class="tag">需要知道：${item.tradeoff}</div>
                </div>
              </div>
            </div>
          `).join("")}
        </div>

        <div class="result-actions">
          <button class="action-btn primary-btn" id="restartBtn">重新测试</button>
          <button class="action-btn secondary-btn" id="editBtn">回到第一题再改</button>
        </div>

        <div class="note">
          图片先用氛围示意图，后面你可以替换成每个海岛/酒店的真实图。<br>
          这版重点是先看问卷流程、页面美感和推荐结果结构。
        </div>
      `;

      document.getElementById("restartBtn").addEventListener("click", () => {
        Object.keys(answers).forEach(key => delete answers[key]);
        currentStep = 0;
        renderQuestion();
      });

      document.getElementById("editBtn").addEventListener("click", () => {
        currentStep = 0;
        renderQuestion();
      });
    }

    renderQuestion();
  </script>
</body>
