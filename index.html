<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的海岛 - Find your island</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 20px;
            background-color: #e0f7fa;
        }
        h1 { 
            color: #006064; 
            text-align: center;
            font-size: 2.5em;
        }
        .island { 
            margin: 30px 0; 
            padding: 25px; 
            border-radius: 15px; 
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 { 
            color: #0288d1; 
            border-bottom: 2px solid #b3e5fc;
            padding-bottom: 10px;
        }
        img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 8px;
            margin: 15px 0;
        }
        .info { 
            line-height: 1.8;
            font-size: 1.1em;
            color: #37474f;
        }
    </style>
</head>
<body>
    <h1>🌴 发现你的完美海岛 🌴</h1>

    <div class="island">
        <h2>🏝️ 芙拉薇莉岛（Furaveri Island）</h2>
        <div class="info">
            <p><strong>📍 位置：</strong>马尔代夫 印度洋</p>
            <p><strong>✨ 特色：</strong>绵延的白沙滩、清澈见底的蓝绿色海水、一价全包奢华度假村</p>
            <p><strong>📝 介绍：</strong>芙拉薇莉岛是马尔代夫北部一座美丽的度假岛屿，拥有壮观的蓝色泻湖和丰富的海洋生物。岛上设施完善，拥有多个餐厅、泳池和水上活动中心，是蜜月度假和亲子旅游的完美选择。</p>
            <p><strong>🏊‍♂️ 活动：</strong>浮潜、潜水、桨板冲浪、出海观鲸</p>
        </div>
    </div>

</body>
</html>
