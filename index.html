<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Find your island - 发现你的完美海岛</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 30px 20px;
            background: linear-gradient(135deg, #87CEEB 0%, #1E90FF 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { 
            color: #006064; 
            text-align: center;
            font-size: 2.3em;
            margin-top: 0;
        }
        .question {
            margin: 30px 0;
            padding: 25px;
            background: #f0f8ff;
            border-radius: 12px;
        }
        h3 {
            color: #0277bd;
            margin-top: 0;
        }
        .options {
            display: grid;
            gap: 12px;
            margin-top: 15px;
        }
        .option label {
            display: block;
            padding: 15px;
            background: white;
            border: 2px solid #e1f5fe;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option input {
            margin-right: 10px;
        }
        .option label:hover {
            border-color: #0288d1;
            background: #fafafa;
        }
        button {
            background: #0288d1;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            margin: 30px auto;
            transition: background 0.3s;
        }
        button:hover {
            background: #01579b;
        }
        .result {
            margin-top: 40px;
            padding: 30px;
            background: #e0f7fa;
            border-radius: 12px;
            display: none;
        }
        .result h2 {
            color: #006064;
            margin-top: 0;
        }
        .island-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .island-card h3 {
            color: #0288d1;
        }
        .reset-btn {
            background: #78909c;
            margin-top: 20px;
        }
        .reset-btn:hover {
            background: #546e7a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏝️ 找到你的完美海岛 🏝️</h1>
        <p style="text-align: center; font-size: 1.2em; color: #555;">回答几个问题，帮你推荐最适合你的马尔代夫海岛</p>

        <form id="quizForm">
            <!-- 问题 1 -->
            <div class="question">
                <h3>1. 你更喜欢什么样的沙滩？</h3>
                <div class="options">
                    <div class="option">
                        <label>
                            <input type="radio" name="q1" value="a" required>
                            A. 细腻粉白的私人沙滩，人少安静
                        </label>
                    </div>
                    <div class="option">
                        <label>
                            <input type="radio" name="q1" value="b">
                            B. 热闹沙滩，有很多水上活动
                        </label>
                    </div>
                    <div class="option">
                        <label>
                            <input type="radio" name="q1" value="c">
                            C. 原始野沙滩，保留自然风貌
                        </label>
                    </div>
                    <div class="option">
                        <label>
                            <input type="radio" name="q1" value="d">
                            D. 拖尾白沙滩，拍照超级出片</label>
</div>
</div>
</div>   <!-- 问题 2 -->
        <div class="question">
            <h3>2. 你的预算大概是？</h3>
            <div class="options">
                <div class="option">
                    <label>
                        <input type="radio" name="q2" value="a" required>
                        A. 奢华享受，预算不敏感
                    </label>
                </div>
                <div class="option">
                    <label>
                        <input type="radio" name="q2" value="b">
                        B. 中等预算，性价比优先
                    </label>
                </div>
                <div class="option">
                    <label>
                        <input type="radio" name="q2" value="c">
                        C. 经济型，省钱为主
                    </label>
                </div>
                <div class="option">
                    <label>
                        <input type="radio" name="q2" value="d">
                        D. 一价全包，预算中等偏上
                    </label>
                </div>
            </div>
        </div>
        <!-- 问题 3 -->
        <div class="question">
            <h3>3. 你旅行的主要目的是？</h3>
            <div class="options">
                <div class="option">
                    <label>
                        <input type="radio" name="q3" value="a" required>
                        A. 蜜月度假，二人世界
                    </label>
                </div>
                <div class="option">
                    <label>
                        <input type="radio" name="q3" value="b">
                        B. 亲子出游，带家人孩子
                    </label>
                </div>
                <div class="option">
                    <label>
                        <input type="radio" name="q3" value="c">
                        C. 潜水探险，看海洋生物
                    </label>
                </div>
                <div class="option">
                    <label>
                        <input type="radio" name="q3" value="d">
                        D. 休闲度假+拍照打卡
                    </label>
                </div>
            </div>
        </div>
        <button type="submit">🔍 为我推荐海岛</button>
    </form>
    <div id="result" class="result">
        <h2>🎉 为你推荐：</h2>
        <div id="resultContent"></div>
        <button type="button" class="reset-btn" onclick="resetQuiz()">🔄 重新开始</button>
    </div>
</div>
<script>
    // 海岛数据库 - 每个组合对应不同海岛
    const islands = {
        // 芙拉薇莉岛 - 当 q1=d 或者 q2=d 或者 q3=d 时推荐
        "ddd": {
            name: "芙拉薇莉岛（Furaveri）",
            description: "芙拉薇莉岛是马尔代夫北部一座美丽的度假岛屿，拥有标志性的长长拖尾白沙滩和清澈的蓝色泻湖。这里是一价全包奢华度假村，设施非常新，服务也很好。",
            features: [
                "✨ 标志性拖尾白沙滩，拍照超级出片",
                "🏨 2019年新开度假村，设施非常新",
                "🍽️ 一价全包，多个餐厅随便吃",
                "🤿 浮潜环境好，出门就能看到珊瑚和鱼",
                "🏊 有超大无边泳池"
            ],
            bestFor: "休闲度假、拍照打卡、蜜月、一价全包体验"
        },
        "dda": {
            name: "芙拉薇莉岛（Furaveri）",
            description: "芙拉薇莉岛非常适合蜜月度假，私密又浪漫，长长的拖尾沙滩二人世界非常惬意。",
            features: [
                "🥂 浪漫私密氛围",
                "📸 拍照绝美",
                "🍷 香槟早餐安排",
                "💑 蜜月赠送水果和香槟"
            ],
            bestFor: "蜜月度假、拍照婚纱"
        },
        "ddb": {
            name: "芙拉薇莉岛（Furaveri）",
            description: "芙拉薇莉岛有儿童俱乐部，沙滩平缓水浅，很适合带孩子来玩。一价全包也省得操心安排餐饮。",
            features: [
                "👶 儿童俱乐部免费",
                "🏖️ 平缓沙滩适合孩子玩耍",
                "🍔 儿童餐选择多",
                "👨‍👩‍👧‍👦 房间空间大"
            ],bestFor: "亲子家庭出游"
},
"ddc":
{
name: "芙拉薇莉岛（Furaveri）",
description: "芙拉薇莉岛周边珊瑚保护得很好，浮潜就能看到很多鱼和海龟，同时沙滩本身也很美。",
features: [
"🤿 离岸浮潜A级",
"🐢 经常看到海龟",
"🌊 珊瑚种类丰富",
"🏝️ 沙滩浮潜双丰收"
],
bestFor: "浮潜爱好者+休闲度假"
},
"ada": {
name: "芙拉薇莉岛（Furaveri）",
description: "芙拉薇莉岛完美满足你休闲度假+拍照的需求，每一天都很出片。",
features: [
"📸 每一处都是拍照点",
"👣 走在拖尾沙滩上太治愈",
"🍹 泳池酒吧打卡拍照",
"☀️ 蓝绿色海水太美了"
],
bestFor: "休闲度假、摄影爱好者"
},
// 示例：其他海岛 - 你可以继续照着这个格式添加
"aaa": {
name: "白马庄园（Cheval Blanc）",
description: "LV集团旗下顶级奢华度假村，极致服务享受，适合预算充足追求品质的客人。",
features: [
"💎 顶级奢华服务",
"🍾 私人泳池别墅",
"👨‍🍳 米其林主厨餐厅",
"🛥️ 免费快艇接送"
],
bestFor: "奢华度假、预算不敏感"
},
"bbc": {
name: "居民岛（Local Island）",
description: "性价比超高的经济型选择，可以体验当地文化，房价物价都便宜。",
features: [
"💰 花费只有度假村的1/10",
"👨‍👩‍👧‍👦 体验当地生活",
"🚌 方便跳岛游",
"🍴 当地美食便宜好吃"
],
bestFor: "背包客、经济型旅行"
}
// 你可以继续加更多... 按照 "key": { 海岛信息 }, 格式添加
};document.getElementById('quizForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // 获取用户选择
        const q1 = document.querySelector('input[name="q1"]:checked').value;
        const q2 = document.querySelector('input[name="q2"]:checked').value;
        const q3 = document.querySelector('input[name="q3"]:checked').value;
        const key = q1 + q2 + q3;
        let resultHtml = "";
        
        if (islands[key]) {
            // 找到了对应的组合，直接推荐
            const island = islands[key];
            resultHtml = `
                <div class="island-card">
                    <h3>🏝️ ${island.name}</h3>
                    <p><strong>📝 介绍：</strong>${island.description}</p>
                    <p><strong>✨ 特色：</strong></p>
                    <ul>
                        ${island.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                    <p><strong>👍 适合人群：</strong>${island.bestFor}</p>
                </div>
            `;
        } else if (key.includes('d')) {
            // 只要选了第四个选项任意一个，默认推荐芙拉薇莉
            const island = islands["ddd"];
            resultHtml = `
                <div class="island-card">
                    <h3>🏝️ ${island.name}</h3>
                    <p><strong>📝 介绍：</strong>${island.description}</p>
                    <p><strong>✨ 特色：</strong></p>
                    <ul>
                        ${island.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                    <p><strong>👍 适合人群：</strong>${island.bestFor}</p>
                </div>
            `;
        } else {
            // 其他组合匹配不到可以提示
            resultHtml = `
                <p>根据你的选择，目前数据库里还没有完全匹配的海岛，可以试试调整选项再看看，或者联系我添加新海岛！</p>
            `;
        }
        document.getElementById('resultContent').innerHTML = resultHtml;
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').scrollIntoView({behavior: 'smooth'});
    });
    function resetQuiz() {
        document.getElementById('quizForm').reset();
        document.getElementById('result').style.display = 'none';window.scrollTo({top: 0, behavior: 'smooth'});
}
</script>
</body>
</html>
