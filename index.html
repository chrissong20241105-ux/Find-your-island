<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找到你的完美马尔代夫海岛</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px;
      background: linear-gradient(135deg, #87CEEB 0%, #1E90FF 100%);
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.18);
    }
    h1 {
      color: #006064;
      text-align: center;
      font-size: 2.2em;
      margin-bottom: 12px;
    }
    .subtitle {
      text-align: center;
      color: #555;
      font-size: 1.1em;
      line-height: 1.6;
      margin-bottom: 35px;
    }
    .intro {
      background: #f5faff;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 28px;
      border-left: 4px solid #0288d1;
      line-height: 1.7;
      color: #333;
    }
    .question {
      margin: 22px 0;
      padding: 22px;
      background: #f0f8ff;
      border-radius: 16px;
    }
    h3 {
      color: #0277bd;
      margin-bottom: 14px;
      font-size: 1.2em;
    }
    .options {
      display: grid;
      gap: 12px;
    }
    .option label {
      display: block;
      padding: 14px;
      background: white;
      border: 2px solid #e1f5fe;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
      line-height: 1.5;
    }
    .option label:hover {
      border-color: #0288d1;
      transform: translateX(3px);
    }
    .option input {
      margin-right: 10px;
      transform: scale(1.15);
    }
    button {
      background: #0288d1;
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.15em;
      border-radius: 10px;
      cursor: pointer;
      display: block;
      margin: 30px auto;
      transition: all 0.25s;
      box-shadow: 0 4px 12px rgba(2,136,209,0.3);
    }
    button:hover {
      background: #01579b;
      transform: translateY(-2px);
    }
    .result {
      margin-top: 35px;
      padding: 28px;
      background: #e0f7fa;
      border-radius: 16px;
      display: none;
    }
    .result h2 {
      color: #006064;
      text-align: center;
      margin-bottom: 20px;
    }
    .island-card {
      background: white;
      padding: 24px;
      border-radius: 14px;
      margin-top: 18px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }
    .island-card h3 {
      color: #0288d1;
      font-size: 1.5em;
      text-align: center;
      margin-bottom: 12px;
    }
    .island-desc {
      text-align: center;
      font-size: 1em;
      line-height: 1.7;
      color: #444;
      margin-bottom: 16px;
    }
    .island-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 16px 0;
    }
    .info-item {
      background: #f8fbff;
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.6;
    }
    .features-list h4,
    .pros h4,
    .cons h4 {
      margin-bottom: 8px;
    }
    .features-list ul,
    .pros ul,
    .cons ul {
      padding-left: 18px;
      line-height: 1.8;
    }
    .pros-cons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 18px;
    }
    .pros {
      background: #e8f5e9;
      padding: 15px;
      border-radius: 10px;
    }
    .cons {
      background: #ffebee;
      padding: 15px;
      border-radius: 10px;
    }
    .reset-btn {
      background: #78909c;
    }
    .reset-btn:hover {
      background: #546e7a;
    }
    @media (max-width: 680px) {
      .island-grid, .pros-cons {
        grid-template-columns: 1fr;
      }
      .container {
        padding: 24px 18px;
      }
      h1 {
        font-size: 1.8em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏝️ 找到你的完美马尔代夫海岛</h1>
    <p class="subtitle">无广告 · 真实测评 · 智能匹配 · 找到最适合你的那座岛</p>

    <div class="intro">
      先回答 4 个最关键的问题。我会根据你的预算、出行类型、体验偏好和上岛接受度，
      给出最适合你的海岛推荐。
    </div>

    <form id="quizForm">
      <div class="question">
        <h3>1. 你的预算大概是？</h3>
        <div class="options">
          <div class="option"><label><input type="radio" name="budget" value="low" required> A. 性价比优先（两个人 2000-8000）</label></div>
          <div class="option"><label><input type="radio" name="budget" value="mid"> B. 中高端度假（两个人 8000-20000）</label></div>
          <div class="option"><label><input type="radio" name="budget" value="high"> C. 奢华体验（两个人 20000+）</label></div>
        </div>
      </div>

      <div class="question">
        <h3>2. 你更像哪类出行人群？</h3>
        <div class="options">
          <div class="option"><label><input type="radio" name="travelType" value="honeymoon" required> A. 蜜月 / 情侣</label></div>
          <div class="option"><label><input type="radio" name="travelType" value="family"> B. 亲子家庭</label></div>
          <div class="option"><label><input type="radio" name="travelType" value="diver"> C. 潜水 / 浮潜爱好者</label></div>
          <div class="option"><label><input type="radio" name="travelType" value="photo"> D. 休闲度假 + 拍照打卡</label></div>
        </div>
      </div>

      <div class="question">
        <h3>3. 你最在意哪种体验？</h3>
        <div class="options">
          <div class="option"><label><input type="radio" name="priority" value="snorkeling" required> A. 浮潜和海洋生物</label></div>
          <div class="option"><label><input type="radio" name="priority" value="luxury"> B. 酒店奢华和服务</label></div>
          <div class="option"><label><input type="radio" name="priority" value="value"> C. 性价比和轻松度假</label></div>
          <div class="option"><label><input type="radio" name="priority" value="photo"> D. 拍照出片和景色</label></div>
        </div>
      </div>

      <div class="question">
        <h3>4. 你能接受的上岛方式是？</h3>
        <div class="options">
          <div class="option"><label><input type="radio" name="transfer" value="fast" required> A. 越快越好，快艇最好</label></div>
          <div class="option"><label><input type="radio" name="transfer" value="plane"> B. 可以接受水飞 / 内飞</label></div>
          <div class="option"><label><input type="radio" name="transfer" value="any"> C. 只要岛好，多久都行</label></div>
        </div>
      </div>

      <button type="submit">生成我的推荐</button>
    </form>

    <div class="result" id="result"></div>
  </div>

  <script>
    const islands = {
      maafushi: {
        name: "马富士居民岛（Maafushi）",
        description: "马尔代夫最成熟的经济型旅行目的地，预算有限想体验马尔代夫的首选。",
        budgetTag: "low",
        travelTags: ["family", "photo"],
        priorityTags: ["value"],
        transferTag: "fast",
        budget: "💰 预算：两个人 2000-4000",
        bestFor: "👉 适合：背包客、经济型旅行、第一次去马代",
        style: "🏝️ 风格：本土风情",
        transfer: "🛥️ 上岛：快艇约25分钟",
        food: "🍽️ 餐饮：本地餐厅多，便宜好吃",
        sand: "🌴 沙滩：⭐⭐⭐",
        snorkeling: "🤿 浮潜：⭐⭐⭐⭐",
        features: [
          "💰 花费低，性价比高",
          "👨‍👩‍👧‍👦 适合家庭和年轻人",
          "🍴 本地生活体验强",
          "🚤 上岛方便"
        ],
        pros: [
          "价格友好",
          "交通方便",
          "适合第一次体验马尔代夫",
          "出海项目丰富"
        ],
        cons: [
          "不够奢华",
          "私密性一般",
          "不是典型顶级度假村路线"
        ]
      },
      chevalBlanc: {
        name: "白马庄园（Cheval Blanc）",
        description: "LV集团旗下顶奢马尔代夫度假村，极致服务和私密体验，是顶级奢华天花板。",
        budgetTag: "high",
        travelTags: ["honeymoon", "photo"],
        priorityTags: ["luxury"],
        transferTag: "plane",
        budget: "💰 预算：两个人 35000+/晚",
        bestFor: "👉 适合：奢华度假、顶级蜜月",
        style: "💎 风格：老钱顶奢",
        transfer: "✈️ 上岛：水飞约25分钟",
        food: "🍽️ 餐饮：米其林主厨级别",
        sand: "🌴 沙滩：⭐⭐⭐⭐⭐",
        snorkeling: "🤿 浮潜：⭐⭐⭐⭐",
        features: [
          "💎 LV集团顶级服务",
          "🏡 超大私人别墅",
          "👨‍🍳 高端餐饮体验",
          "🔒 私密度极高"
        ],
        pros: [
          "服务天花板",
          "非常适合蜜月",
          "餐饮强",
          "硬件顶级"
        ],
        cons: [
          "价格极高",
          "预算门槛高",
          "不是主打性价比"
        ]
      },
      olhuveli: {
        name: "双鱼岛（Olhuveli）",
        description: "老牌经典高性价比海岛，浮潜很强，是很多人第一次去马代的热门选择。",
        budgetTag: "mid",
        travelTags: ["diver", "honeymoon", "family"],
        priorityTags: ["snorkeling", "value"],
        transferTag: "fast",
        budget: "💰 预算：两个人 8000-15000",
        bestFor: "👉 适合：潜水爱好者、性价比度假",
        style: "🌴 风格：经典热带度假风",
        transfer: "🛥️ 上岛：快艇约45分钟",
        food: "🍽️ 餐饮：半餐 / 一价全包可选",
        sand: "🌴 沙滩：⭐⭐⭐⭐",
        snorkeling: "🤿 浮潜：⭐⭐⭐⭐⭐",
        features: [
          "🤿 岸边浮潜非常好",
          "💰 性价比高",
          "🐟 容易看到海洋生物",
          "📸 拖尾沙滩好拍"
        ],
        pros: [
          "浮潜出色",
          "价格相对合理",
          "适合第一次住度假村",
          "综合表现均衡"
        ],
        cons: [
          "设施有些年份感",
          "旺季较热门"
        ]
      },
      sonevaJani: {
        name: "索尼娃贾尼（Soneva Jani）",
        description: "马代最有名的网红岛之一，屋顶滑梯、水上别墅和极强的视觉冲击力让它非常适合拍照和蜜月。",
        budgetTag: "high",
        travelTags: ["honeymoon", "photo"],
        priorityTags: ["photo", "luxury"],
        transferTag: "plane",
        budget: "💰 预算：两个人 30000-60000",
        bestFor: "👉 适合：网红打卡、拍照、蜜月",
        style: "📸 风格：现代网红轻奢风",
        transfer: "✈️ 上岛：水飞约40分钟",
        food: "🍽️ 餐饮：创意料理",
        sand: "🌴 沙滩：⭐⭐⭐⭐⭐",
        snorkeling: "🤿 浮潜：⭐⭐⭐⭐",
        features: [
          "🛝 屋顶滑梯入海",
          "📸 非常出片",
          "🌌 星空体验浪漫",
          "🌿 环保自然设计"
        ],
        pros: [
          "拍照效果极强",
          "很适合蜜月",
          "品牌辨识度高",
          "体验感独特"
        ],
        cons: [
          "价格高",
          "旺季难订",
          "更偏拍照和体验，不是纯性价比路线"
        ]
      }
    };

    function calculateMatch(answers) {
      const scores = [];

      for (const key in islands) {
        const island = islands[key];
        let score = 0;

        if (answers.budget === island.budgetTag) score += 3;
        if (island.travelTags.includes(answers.travelType)) score += 3;
        if (island.priorityTags.includes(answers.priority)) score += 4;

        if (answers.transfer === "any") {
          score += 2;
        } else if (answers.transfer === island.transferTag) {
          score += 2;
        }

        scores.push({ ...island, score });
      }

      scores.sort((a, b) => b.score - a.score);
      return scores[0];
    }

    document.getElementById("quizForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const answers = {
        budget: document.querySelector('input[name="budget"]:checked')?.value,
        travelType: document.querySelector('input[name="travelType"]:checked')?.value,
        priority: document.querySelector('input[name="priority"]:checked')?.value,
        transfer: document.querySelector('input[name="transfer"]:checked')?.value
      };

      const matched = calculateMatch(answers);
      const result = document.getElementById("result");

      if (!matched) {
        result.style.display = "block";
        result.innerHTML = `
          <h2>暂时没有匹配结果</h2>
          <p style="text-align:center;">请调整一下你的选项后重试。</p>
        `;
        return;
      }

      result.innerHTML = `
        <h2>🎯 你的推荐结果</h2>
        <div class="island-card">
          <h3>${matched.name}</h3>
          <p class="island-desc">${matched.description}</p>

          <div class="island-grid">
            <div class="info-item"><strong>${matched.budget}</strong></div>
            <div class="info-item"><span>${matched.bestFor}</span></div>
            <div class="info-item"><span>${matched.style}</span></div>
            <div class="info-item"><span>${matched.transfer}</span></div>
            <div class="info-item"><span>${matched.food}</span></div>
            <div class="info-item"><span>${matched.sand}</span></div>
            <div class="info-item"><span>${matched.snorkeling}</span></div>
            <div class="info-item"><strong>匹配分：${matched.score}</strong></div>
          </div>

          <div class="features-list">
            <h4>✨ 特色亮点</h4>
            <ul>
              ${matched.features.map(f => `<li>${f}</li>`).join('')}
            </ul>
          </div>

          <div class="pros-cons">
            <div class="pros">
              <h4>✅ 优点</h4>
              <ul>
                ${matched.pros.map(p => `<li>${p}</li>`).join('')}
              </ul>
            </div>
            <div class="cons">
              <h4>⚠️ 缺点</h4>
              <ul>
                ${matched.cons.map(c => `<li>${c}</li>`).join('')}
              </ul>
            </div>
          </div>

          <button class="reset-btn" onclick="location.reload()">重新测试</button>
        </div>
      `;
      result.style.display = "block";
      result.scrollIntoView({ behavior: "smooth" });
    });
  </script>
</body>
</html>
